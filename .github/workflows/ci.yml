name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  lint-and-typecheck:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: 构建验证
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  test-unit:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run tests/unit --coverage
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unit
          name: unit-tests
          fail_ci_if_error: false

  test-integration:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run --config vitest.integration.config.ts
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: integration

  test-e2e:
    name: 端到端测试
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx playwright install --with-deps
      - run: npx playwright test
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-report
          path: test-reports/
          retention-days: 7
          if-no-files-found: ignore

  test-performance:
    name: 性能测试
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run tests/performance --reporter=json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-report
          path: performance-report.json
          retention-days: 7
          if-no-files-found: ignore

  test-security:
    name: 安全测试
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org
        continue-on-error: true
      - run: npx vitest run tests/security --reporter=json
      - uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN || '' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-report
          path: |
            security-report.json
            snyk-report.html
          retention-days: 7
          if-no-files-found: ignore

  generate-status:
    name: 生成状态报告
    runs-on: ubuntu-latest
    needs:
      [
        lint-and-typecheck,
        build,
        test-unit,
        test-integration,
        test-e2e,
        test-performance,
        test-security,
      ]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx tsx scripts/generate-ci-status.ts
      - run: npx tsx scripts/generate-test-report.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-status-report
          path: ci-status-report.json
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-reports/test-report.json
          retention-days: 14
          if-no-files-found: ignore
