name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: 构建并部署
    environment:
      name: github-pages
      url: https://portable.yyc3.top
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        run: npm i -g pnpm@11.10.0

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile 2>&1 || true
          pnpm install --no-frozen-lockfile 2>&1
        env:
          PNPM_MINIMUM_RELEASE_AGE: 0

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
