name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  snyk-security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN || '' }}
        with:
          args: --severity-threshold=medium --org=yyc3-team --project-name=yyc3-portaisys --sarif-file-output=snyk.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  pnpm-audit:
    name: pnpm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npm audit --registry https://registry.npmjs.org
        continue-on-error: true

  owasp-zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: [snyk-security, pnpm-audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vite build
        continue-on-error: true
      - run: npx vite preview --port 3200 &
        continue-on-error: true
      - run: |
          for i in {1..30}; do
            if curl -f http://localhost:3200; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application... ($i/30)"
            sleep 2
          done
      - uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:3200"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap_report.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [snyk-security, pnpm-audit, owasp-zap-scan]
    if: always()
    steps:
      - name: Generate Security Summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Snyk Security: 完成" >> $GITHUB_STEP_SUMMARY
          echo "- npm Audit: 完成" >> $GITHUB_STEP_SUMMARY
          echo "- OWASP ZAP Scan: 完成" >> $GITHUB_STEP_SUMMARY
