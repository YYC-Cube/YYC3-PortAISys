name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  snyk-security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --org=yyc3-team --project-name=yyc3-portaisys --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

  pnpm-audit:
    name: pnpm Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Run pnpm audit
        run: pnpm audit --registry https://registry.npmjs.org
        continue-on-error: true

  owasp-zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: [snyk-security, pnpm-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm run build
        continue-on-error: true

      - name: Start application
        run: pnpm run dev &
        continue-on-error: true

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3200/health; then
              echo "Application is ready"
              break
            fi
            echo "Waiting for application... ($i/30)"
            sleep 2
          done

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:3200"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Upload ZAP SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: zap_report.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [snyk-security, pnpm-audit, owasp-zap-scan]
    if: always()

    steps:
      - name: Generate Security Summary
        run: |
          echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Snyk Security: ${{ needs.snyk-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- pnpm Audit: ${{ needs.pnpm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- OWASP ZAP Scan: ${{ needs.owasp-zap-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Recommendations" >> $GITHUB_STEP_SUMMARY
          echo "1. Review all security findings" >> $GITHUB_STEP_SUMMARY
          echo "2. Fix critical and high severity vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "3. Update dependencies to secure versions" >> $GITHUB_STEP_SUMMARY
          echo "4. Implement security best practices" >> $GITHUB_STEP_SUMMARY
