name: Phase 1-3 全面测试

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  verify-implementation:
    name: 验证实现
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx tsx scripts/verify-implementation.ts
      - uses: actions/upload-artifact@v4
        with:
          name: implementation-verification
          path: test-reports/implementation-verification.json

  phase1-tests:
    name: Phase 1 - 短期提升测试
    needs: verify-implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run tests/unit --coverage
      - run: npx vitest run tests/integration --coverage
      - run: npx playwright test
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: phase1
      - uses: actions/upload-artifact@v4
        with:
          name: phase1-test-reports
          path: test-reports/

  phase2-tests:
    name: Phase 2 - 中期优化测试
    needs: verify-implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run tests/performance --reporter=json
      - run: npx vitest run tests/security --reporter=json
      - uses: actions/upload-artifact@v4
        with:
          name: phase2-performance-reports
          path: test-reports/

  phase3-tests:
    name: Phase 3 - 长期增强测试
    needs: verify-implementation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-suite:
          - agent-tests
          - plugin-tests
          - mobile-tests
          - multimodal-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - name: Run ${{ matrix.test-suite }}
        run: |
          case "${{ matrix.test-suite }}" in
            agent-tests)
              npx vitest run tests/unit/ai/
              ;;
            plugin-tests)
              npx vitest run tests/integration/plugin-system.test.ts
              ;;
            mobile-tests)
              npx vitest run tests/integration/mobile-app.test.ts
              ;;
            multimodal-tests)
              npx vitest run tests/integration/multimodal.test.ts
              npx vitest run tests/integration/multi-model.test.ts
              ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: phase3-${{ matrix.test-suite }}-reports
          path: test-reports/

  e2e-workflow-tests:
    name: 端到端工作流测试
    needs: [phase1-tests, phase2-tests, phase3-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx vitest run tests/e2e/complete-workflow.test.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: e2e-workflow-reports
          path: test-reports/

  generate-summary:
    name: 生成测试摘要
    needs: [phase1-tests, phase2-tests, phase3-tests, e2e-workflow-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-reports
      - uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
      - run: npm install --ignore-scripts --no-package-lock
      - run: npx tsx scripts/generate-test-report.ts --input=all-reports
      - uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-reports/summary.html
